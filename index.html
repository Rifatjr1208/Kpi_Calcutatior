<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bKash Variable Salary</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #fce4ec;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* Watermark */
  .watermark {
    position: fixed;
    top: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    padding: 6px 10px;
    border-radius: 25px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    text-decoration: none;
    z-index: 999;
  }

  .profile-pic {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #e2136e;
  }

  .wm-text {
    font-size: 12px;
    color: #333;
  }

  /* Card */
  .card {
    background: white;
    padding: 40px;
    border-radius: 18px;
    width: 420px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.2);
    text-align: center;
  }

  .header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .header img {
    width: 38px;
  }

  .title {
    color: #e2136e;
    font-size: 26px;
    font-weight: bold;
  }

  input {
    width: 95%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
  }

  input:focus {
    border-color: #e2136e;
  }

  button {
    background: #e2136e;
    color: white;
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    margin-top: 12px;
    font-size: 17px;
    cursor: pointer;
  }

  .avg {
    margin-top: 15px;
    font-size: 14px;
    color: #777;
  }

  .result {
    margin-top: 10px;
    font-size: 24px;
    font-weight: bold;
    color: #333;
  }
</style>

</head>

    <div class="title">Variable Salary</div>
  </div>

  <input type="number" id="p" placeholder="Payment Amount %">
  <input type="number" id="a" placeholder="Active Merchant %">
  <input type="number" id="r" placeholder="Mobile Recharge %">
  <input type="number" id="acq" placeholder="Acquisition %">

  <button onclick="calculate()">Calculate</button>

  <div class="avg" id="avg"></div>
  <div class="result" id="var"></div>

</div>

<script>
function calculate() {
  let p = +document.getElementById("p").value || 0;
  let a = +document.getElementById("a").value || 0;
  let r = +document.getElementById("r").value || 0;
  let acq = +document.getElementById("acq").value || 0;

  let avg = (p + a + r + acq) / 4;
  let variable = 5500 * (avg / 100);

  document.getElementById("avg").innerText =
    "Average: " + avg.toFixed(2) + "%";

  document.getElementById("var").innerText =
    "Variable Salary: " + variable.toFixed(2) + " Tk";
}
</script>
